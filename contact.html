  <section class="py-20">
    <h2 class="text-4xl text-center font-semibold mb-8">Contact Us</h2>
    <div class="container mx-auto text-center">
      <form action="submit_form.php" method="POST">
        <input type="text" name="name" placeholder="Your Name" class="w-full p-4 mb-4 border rounded-md" required>
        <input type="email" name="email" placeholder="Your Email" class="w-full p-4 mb-4 border rounded-md" required>
        <textarea name="message" rows="6" placeholder="Your Message" class="w-full p-4 mb-4 border rounded-md" required></textarea>
        <button type="submit" class="bg-yellow-500 text-white py-3 px-6 rounded-md hover:bg-yellow-400 transition">Send Message</button>
